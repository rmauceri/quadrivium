<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Quadrivium</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; overscroll-behavior: none; background: #2c2520; }
canvas { display: block; touch-action: none; }
</style>
</head>
<body>
<canvas id="c"></canvas>

<script src="https://cdn.jsdelivr.net/npm/roughjs@4.6.6/bundled/rough.min.js"></script>
<script>
'use strict';

/* =============================================================
   CONSTANTS & CONFIG
   ============================================================= */

const BG = '#2c2520';

// A minor pentatonic — 3 octaves
const SCALE = [
  110.00, 130.81, 146.83, 164.81, 196.00,
  220.00, 261.63, 293.66, 329.63, 392.00,
  440.00, 523.25, 587.33, 659.26, 783.99,
  880.00
];

const SHAPE_DEFS = {
  circle:   { color: [230,175,50],  breath: 'pulse',  bRate: 0.30, bAmt: 0.055, rough: 1.5, fill: 'hachure',     hAng: -41, hGap: 5 },
  triangle: { color: [230,90,100],  breath: 'flicker',bRate: 1.80, bAmt: 0.025, rough: 1.8, fill: 'cross-hatch', hAng:  60, hGap: 6 },
  square:   { color: [80,150,200],  breath: 'tick',   bRate: 0.60, bAmt: 0.045, rough: 1.0, fill: 'hachure',     hAng:   0, hGap: 5 },
  pentagon: { color: [170,110,210], breath: 'drift',  bRate: 0.05, bAmt: 0.10,  rough: 1.6, fill: 'hachure',     hAng:  30, hGap: 5 },
  hexagon:  { color: [100,190,130], breath: 'kick',   bRate: 0.30, bAmt: 0.06,  rough: 1.3, fill: 'hachure',     hAng: -60, hGap: 5 },
};

const TYPES       = Object.keys(SHAPE_DEFS);
const BASE_SIZE   = 0.095;
const SIZE_VARY   = 0.012;
const PAL_SCALE   = 0.55;
const PAL_Y       = 0.93;
const PAL_ZONE    = 0.87;
const PROX_FRAC   = 0.28;
const MIN_HIT     = 44;
const DBL_TAP_MS  = 350;
const DOT_SP      = 0.03;
const DOT_ALPHA   = 0.10;

/* =============================================================
   STATE
   ============================================================= */

const cvs = document.getElementById('c');
const ctx = cvs.getContext('2d');
let rc;
let W, H, unit;

let shapes   = [];
let palette  = [];
let drag     = null;
let audioOK  = false;
let tapTime  = 0, tapId = -1;
let proxPairs = [];
let nextId   = 1;
let volumeVal = 0.3;
let volDrag   = false;
let motes    = [];   // floating dust particles

let grainCvs, tableCvs;
let masterGain;
let actx;           // raw AudioContext — created in gesture handler

/* =============================================================
   UTILITY
   ============================================================= */

const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

function pitchFromY(y) {
  const t = 1 - clamp(y, 0, 1);
  return SCALE[Math.round(t * (SCALE.length - 1))];
}

function volFromSize(sz) {
  // returns a linear gain 0..1
  const t = clamp((sz - 0.04) / 0.04, 0, 1);
  return 0.05 + t * 0.25;
}

function shapeVolume(shape) {
  // volAngle range: -3PI..+3PI  →  volume multiplier: 0..2
  // 3 full turns CW = max, 3 CCW = mute. Default (0) = 1x.
  const VOL_TURNS = 3;
  const base = volFromSize(shape.size);
  const knob = clamp(1 + shape.volAngle / (VOL_TURNS * Math.PI), 0, 2);
  return base * knob;
}

function pxDist(a, b) {
  const dx = (a.x - b.x) * W, dy = (a.y - b.y) * H;
  return Math.sqrt(dx * dx + dy * dy);
}

/* =============================================================
   AUDIO ENGINE  (raw Web Audio API)
   ============================================================= */

// Noise buffer (shared, created once)
let noiseBuffer = null;
function getNoiseBuffer() {
  if (noiseBuffer) return noiseBuffer;
  const len = actx.sampleRate * 2;
  noiseBuffer = actx.createBuffer(1, len, actx.sampleRate);
  const data = noiseBuffer.getChannelData(0);
  for (let i = 0; i < len; i++) data[i] = Math.random() * 2 - 1;
  return noiseBuffer;
}

function buildImpulse(ctx, decay, duration) {
  const len = ctx.sampleRate * duration;
  const buf = ctx.createBuffer(2, len, ctx.sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const data = buf.getChannelData(ch);
    for (let i = 0; i < len; i++) {
      const t = i / ctx.sampleRate;
      // Exponential decay with early reflection bump
      const env = Math.exp(-t * decay) * (1 + 0.3 * Math.exp(-t * 18));
      // Warm: low-pass by averaging neighbors
      const noise = Math.random() * 2 - 1;
      data[i] = noise * env;
    }
    // Simple low-pass smoothing for warmth
    for (let i = 1; i < len; i++) {
      data[i] = data[i] * 0.55 + data[i - 1] * 0.45;
    }
  }
  return buf;
}

function initAudio() {
  if (audioOK) return;
  audioOK = true;

  // Create AudioContext directly in the gesture handler —
  // this is the only reliable way to get a "gesture-blessed"
  // context on mobile browsers.
  actx = new (window.AudioContext || window.webkitAudioContext)();
  if (actx.state === 'suspended') actx.resume();

  masterGain = actx.createGain();
  masterGain.gain.value = volumeVal;

  // Reverb send: masterGain → dry + wet(convolver) → destination
  const dryGain = actx.createGain();
  dryGain.gain.value = 0.75;
  const wetGain = actx.createGain();
  wetGain.gain.value = 0.35;
  const convolver = actx.createConvolver();
  convolver.buffer = buildImpulse(actx, 2.2, 3.5);
  masterGain.connect(dryGain);
  masterGain.connect(convolver);
  convolver.connect(wetGain);
  dryGain.connect(actx.destination);
  wetGain.connect(actx.destination);

  shapes.forEach(s => attachSynth(s));
  recomputeProximity();

  // iOS 17.5+ visibility bug — context interrupted on tab switch
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible' && actx.state !== 'running') {
      actx.resume();
    }
  });
}

// --- Synth builders per shape type ---

function buildCircleSynth(freq) {
  // Sine oscillator with tremolo (LFO on gain)
  const osc = actx.createOscillator();
  osc.type = 'sine';
  osc.frequency.value = freq;

  const gain = actx.createGain();
  gain.gain.value = 0.3;

  // Tremolo: LFO modulates gain
  const lfo = actx.createOscillator();
  lfo.type = 'sine';
  lfo.frequency.value = 0.15;
  const lfoGain = actx.createGain();
  lfoGain.gain.value = 0.06;
  lfo.connect(lfoGain);
  lfoGain.connect(gain.gain);
  lfo.start();

  osc.connect(gain);
  gain.connect(masterGain);
  osc.start();

  return { osc, gain, lfo, lfoGain,
    setFreq(f) { osc.frequency.linearRampToValueAtTime(f, actx.currentTime + 0.12); },
    setVol(v) { gain.gain.linearRampToValueAtTime(v, actx.currentTime + 0.25); },
    destroy() {
      gain.gain.linearRampToValueAtTime(0, actx.currentTime + 0.6);
      setTimeout(() => { osc.stop(); lfo.stop(); }, 700);
    }
  };
}

function buildTriangleSynth(freq) {
  // FM synthesis: modulator → carrier, with chorus (delayed detuned copy)
  const mod = actx.createOscillator();
  mod.type = 'sine';
  mod.frequency.value = freq * 3;  // harmonicity = 3
  const modGain = actx.createGain();
  modGain.gain.value = freq * 1.4;  // modulationIndex * freq
  mod.connect(modGain);

  const carrier = actx.createOscillator();
  carrier.type = 'sine';
  carrier.frequency.value = freq;
  modGain.connect(carrier.frequency);

  // Simple chorus: delay with LFO
  const dry = actx.createGain();
  dry.gain.value = 0.7;
  const wet = actx.createGain();
  wet.gain.value = 0.3;
  const delay = actx.createDelay();
  delay.delayTime.value = 0.012;
  const chorusLfo = actx.createOscillator();
  chorusLfo.type = 'sine';
  chorusLfo.frequency.value = 0.8;
  const chorusDepth = actx.createGain();
  chorusDepth.gain.value = 0.004;
  chorusLfo.connect(chorusDepth);
  chorusDepth.connect(delay.delayTime);
  chorusLfo.start();

  const out = actx.createGain();
  out.gain.value = 0.25;
  carrier.connect(dry);
  carrier.connect(delay);
  delay.connect(wet);
  dry.connect(out);
  wet.connect(out);
  out.connect(masterGain);
  carrier.start();
  mod.start();

  return { carrier, mod, modGain, out, chorusLfo,
    setFreq(f) {
      carrier.frequency.linearRampToValueAtTime(f, actx.currentTime + 0.12);
      mod.frequency.linearRampToValueAtTime(f * 3, actx.currentTime + 0.12);
      modGain.gain.linearRampToValueAtTime(f * 1.4, actx.currentTime + 0.12);
    },
    setVol(v) { out.gain.linearRampToValueAtTime(v, actx.currentTime + 0.25); },
    destroy() {
      out.gain.linearRampToValueAtTime(0, actx.currentTime + 0.6);
      setTimeout(() => { carrier.stop(); mod.stop(); chorusLfo.stop(); }, 700);
    }
  };
}

function buildSquareSynth(shape) {
  // White noise tick rhythm via setInterval
  const gain = actx.createGain();
  gain.gain.value = 0.25;
  gain.connect(masterGain);

  const rate = 0.15 + shape.x * 0.6;
  function tick() {
    const src = actx.createBufferSource();
    src.buffer = getNoiseBuffer();
    const env = actx.createGain();
    env.gain.setValueAtTime(0.8, actx.currentTime);
    env.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + 0.08);
    // Bandpass for hi-hat character
    const bp = actx.createBiquadFilter();
    bp.type = 'bandpass';
    bp.frequency.value = 6000;
    bp.Q.value = 2;
    src.connect(bp);
    bp.connect(env);
    env.connect(gain);
    src.start();
    src.stop(actx.currentTime + 0.1);
  }
  let intervalId = setInterval(tick, rate * 1000);
  tick();

  return { _isRhythm: true, gain, intervalId, rate,
    setRate(r) {
      clearInterval(intervalId);
      this.rate = r;
      intervalId = setInterval(tick, r * 1000);
      this.intervalId = intervalId;
    },
    setVol(v) { gain.gain.linearRampToValueAtTime(v, actx.currentTime + 0.25); },
    destroy() {
      clearInterval(intervalId);
      gain.gain.linearRampToValueAtTime(0, actx.currentTime + 0.5);
      setTimeout(() => { try { gain.disconnect(); } catch(_){} }, 600);
    }
  };
}

function buildPentagonSynth(freq) {
  // Detuned unison: 3 sine oscillators with slight spread
  const out = actx.createGain();
  out.gain.value = 0.2;

  const oscs = [-17.5, 0, 17.5].map(detune => {
    const osc = actx.createOscillator();
    osc.type = 'sine';
    osc.frequency.value = freq;
    osc.detune.value = detune;
    osc.connect(out);
    osc.start();
    return osc;
  });

  // Simple phaser: chain of allpass filters with LFO
  const phaser = actx.createBiquadFilter();
  phaser.type = 'allpass';
  phaser.frequency.value = 1000;
  const phaserLfo = actx.createOscillator();
  phaserLfo.type = 'sine';
  phaserLfo.frequency.value = 0.15;
  const phaserDepth = actx.createGain();
  phaserDepth.gain.value = 800;
  phaserLfo.connect(phaserDepth);
  phaserDepth.connect(phaser.frequency);
  phaserLfo.start();

  // Mix dry/wet
  const dry = actx.createGain();
  dry.gain.value = 0.75;
  const wet = actx.createGain();
  wet.gain.value = 0.25;
  out.connect(dry);
  out.connect(phaser);
  phaser.connect(wet);
  const mix = actx.createGain();
  mix.gain.value = 1;
  dry.connect(mix);
  wet.connect(mix);
  mix.connect(masterGain);

  return { oscs, out, mix, phaserLfo,
    setFreq(f) {
      oscs.forEach(o => o.frequency.linearRampToValueAtTime(f, actx.currentTime + 0.12));
    },
    setVol(v) { mix.gain.linearRampToValueAtTime(v, actx.currentTime + 0.25); },
    destroy() {
      mix.gain.linearRampToValueAtTime(0, actx.currentTime + 0.6);
      setTimeout(() => { oscs.forEach(o => o.stop()); phaserLfo.stop(); }, 700);
    }
  };
}

function buildHexagonSynth(shape) {
  // Membrane kick: sine with pitch sweep into sub-bass
  const gain = actx.createGain();
  gain.gain.value = 0.5;
  gain.connect(masterGain);

  let basePitch = pitchFromY(shape.y) * 0.25;  // deep sub-bass floor

  function kick() {
    const osc = actx.createOscillator();
    osc.type = 'sine';
    const now = actx.currentTime;
    osc.frequency.setValueAtTime(basePitch * 4, now);           // start lower
    osc.frequency.exponentialRampToValueAtTime(basePitch, now + 0.12);  // slower sweep
    const env = actx.createGain();
    env.gain.setValueAtTime(1, now);
    env.gain.exponentialRampToValueAtTime(0.001, now + 0.6);    // longer body
    osc.connect(env);
    env.connect(gain);
    osc.start(now);
    osc.stop(now + 0.7);
  }
  let intervalId = setInterval(kick, (0.3 + shape.x * 1.2) * 1000);
  kick();

  return { _isRhythm: true, gain, intervalId, basePitch,
    setRate(r) {
      clearInterval(intervalId);
      this.rate = r;
      intervalId = setInterval(kick, r * 1000);
      this.intervalId = intervalId;
    },
    setPitch(p) { basePitch = p; },
    setVol(v) { gain.gain.linearRampToValueAtTime(v, actx.currentTime + 0.25); },
    destroy() {
      clearInterval(intervalId);
      gain.gain.linearRampToValueAtTime(0, actx.currentTime + 0.5);
      setTimeout(() => { try { gain.disconnect(); } catch(_){} }, 600);
    }
  };
}

function attachSynth(shape) {
  if (shape.synth || shape.isPalette || !masterGain) return;
  const freq = pitchFromY(shape.y);
  let synth;

  switch (shape.type) {
    case 'circle':   synth = buildCircleSynth(freq); break;
    case 'triangle': synth = buildTriangleSynth(freq); break;
    case 'square':   synth = buildSquareSynth(shape); break;
    case 'pentagon': synth = buildPentagonSynth(freq); break;
    case 'hexagon':  synth = buildHexagonSynth(shape); break;
  }

  shape.synth = synth;
  synth.setVol(shapeVolume(shape));
}

function detachSynth(shape) {
  if (!shape.synth) return;
  shape.synth.destroy();
  shape.synth = null;
}

function updateShapeAudio(shape) {
  if (!shape.synth) return;
  if (shape.synth._isRhythm) {
    const rate = shape.type === 'square'
      ? (0.2 + shape.x * 0.8)
      : (0.4 + shape.x * 1.6);
    shape.synth.setRate(rate);
    if (shape.synth.setPitch) {
      shape.synth.setPitch(pitchFromY(shape.y) * 0.5);
    }
  } else {
    shape.synth.setFreq(pitchFromY(shape.y));
  }
}

function applyProximityAudio() {
  shapes.forEach(s => {
    if (!s.synth) return;
    const base  = shapeVolume(s);
    const boost = Math.min(s.proxBoost || 0, 0.3);
    s.synth.setVol(base + boost);
  });
}

/* =============================================================
   PROXIMITY
   ============================================================= */

function recomputeProximity() {
  const diag = Math.sqrt(W * W + H * H);
  const thresh = PROX_FRAC * diag;
  proxPairs = [];
  shapes.forEach(s => s.proxBoost = 0);

  for (let i = 0; i < shapes.length; i++) {
    if (shapes[i].dying) continue;
    for (let j = i + 1; j < shapes.length; j++) {
      if (shapes[j].dying) continue;
      const d = pxDist(shapes[i], shapes[j]);
      if (d < thresh) {
        const str = 1 - d / thresh;
        proxPairs.push({ a: shapes[i], b: shapes[j], strength: str });
        shapes[i].proxBoost += str * 3.5;
        shapes[j].proxBoost += str * 3.5;
      }
    }
  }

  if (audioOK) applyProximityAudio();
}

function drawProximityLines() {
  proxPairs.forEach(({ a, b, strength }) => {
    const alpha = strength * 0.45;
    if (alpha < 0.01) return;
    // Blend the two shapes' colors for tinted resonance wisps
    const r = Math.round((a.rgb[0] + b.rgb[0]) / 2);
    const g = Math.round((a.rgb[1] + b.rgb[1]) / 2);
    const bl = Math.round((a.rgb[2] + b.rgb[2]) / 2);
    rc.line(a.x * W, a.y * H, b.x * W, b.y * H, {
      stroke: `rgba(${r},${g},${bl},${alpha})`,
      strokeWidth: 0.6 + strength * 1.8,
      roughness: 2.5,
      seed: a.seed ^ b.seed,
    });
  });
}

/* =============================================================
   DUST MOTES — luminous particles drifting across the table
   ============================================================= */

const MOTE_COUNT = 60;
const MOTE_DRIFT = 0.00004;  // base drift speed (fraction of screen per frame)
const MOTE_PULL  = 0.00015;  // attraction toward sounding shapes

function initMotes() {
  motes = [];
  for (let i = 0; i < MOTE_COUNT; i++) {
    motes.push({
      x: Math.random(),
      y: Math.random() * PAL_ZONE,
      vx: (Math.random() - 0.5) * MOTE_DRIFT,
      vy: (Math.random() - 0.5) * MOTE_DRIFT,
      r: 0.8 + Math.random() * 1.2,
      alpha: 0.06 + Math.random() * 0.12,
      phase: Math.random() * Math.PI * 2,
    });
  }
}

function updateAndDrawMotes(time) {
  const t = time * 0.001;
  ctx.save();
  motes.forEach(m => {
    // Gentle attraction toward sounding shapes
    let ax = 0, ay = 0;
    shapes.forEach(s => {
      if (s.dying) return;
      const dx = s.x - m.x, dy = s.y - m.y;
      const dist = Math.sqrt(dx * dx + dy * dy) + 0.01;
      if (dist < 0.3) {
        const pull = MOTE_PULL * (1 - dist / 0.3);
        ax += (dx / dist) * pull;
        ay += (dy / dist) * pull;
      }
    });

    m.vx += ax;
    m.vy += ay;
    // Damping
    m.vx *= 0.992;
    m.vy *= 0.992;
    // Drift noise
    m.vx += (Math.random() - 0.5) * MOTE_DRIFT * 0.3;
    m.vy += (Math.random() - 0.5) * MOTE_DRIFT * 0.3;

    m.x += m.vx;
    m.y += m.vy;

    // Wrap around
    if (m.x < -0.02) m.x = 1.02;
    if (m.x > 1.02) m.x = -0.02;
    if (m.y < -0.02) m.y = PAL_ZONE + 0.02;
    if (m.y > PAL_ZONE + 0.02) m.y = -0.02;

    // Slow twinkle
    const flicker = 0.7 + 0.3 * Math.sin(t * 0.8 + m.phase);
    const a = m.alpha * flicker;

    ctx.globalAlpha = a;
    ctx.fillStyle = 'rgba(220,210,190,1)';
    ctx.beginPath();
    ctx.arc(m.x * W, m.y * H, m.r, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.restore();
}

/* =============================================================
   SHAPE SYSTEM
   ============================================================= */

function makeShape(type, x, y, asPalette) {
  const def = SHAPE_DEFS[type];
  const [cr, cg, cb] = def.color;
  const v = asPalette ? 0 : 18;
  return {
    id: nextId++, type, x, y,
    size: asPalette ? BASE_SIZE * PAL_SCALE : BASE_SIZE + (Math.random() - 0.5) * SIZE_VARY * 2,
    rgb: [
      clamp(Math.round(cr + (Math.random() - 0.5) * v), 0, 255),
      clamp(Math.round(cg + (Math.random() - 0.5) * v), 0, 255),
      clamp(Math.round(cb + (Math.random() - 0.5) * v), 0, 255),
    ],
    phase: Math.random() * Math.PI * 2,
    seed: Math.floor(Math.random() * 1e6),
    volAngle: 0,       // rotation offset from volume knob (radians, 0 = default vol)
    synth: null, extras: [],
    opacity: asPalette ? 0.55 : 0,    // non-palette shapes fade in from 0
    fadeTarget: asPalette ? 0.55 : 1,
    dying: false,
    isPalette: !!asPalette,
    proxBoost: 0,
    _cache: null, _dirty: true,
  };
}

function cacheShape(shape) {
  const px = Math.ceil(shape.size * unit * 1.8);
  if (px < 4) return;

  const c = document.createElement('canvas');
  c.width = c.height = px;
  const crc = rough.canvas(c);
  const mid = px / 2, sz = shape.size * unit;
  const [r, g, b] = shape.rgb;
  const sa = shape.isPalette ? 0.65 : 0.85;
  const fa = shape.isPalette ? 0.12 : 0.20;

  const opts = {
    stroke: `rgba(${r},${g},${b},${sa})`,
    strokeWidth: shape.isPalette ? 1 : 1.5,
    roughness: SHAPE_DEFS[shape.type].rough,
    fill: `rgba(${r},${g},${b},${fa})`,
    fillStyle: SHAPE_DEFS[shape.type].fill,
    fillWeight: 0.5,
    hachureAngle: SHAPE_DEFS[shape.type].hAng,
    hachureGap: Math.max(3, SHAPE_DEFS[shape.type].hGap * (unit / 700)),
    seed: shape.seed,
  };

  switch (shape.type) {
    case 'circle':
      crc.circle(mid, mid, sz, opts);
      break;
    case 'triangle': {
      const h = sz * 0.866;
      crc.polygon([
        [mid, mid - h * 0.55],
        [mid - sz * 0.5, mid + h * 0.45],
        [mid + sz * 0.5, mid + h * 0.45],
      ], opts);
      break;
    }
    case 'square':
      crc.rectangle(mid - sz * 0.45, mid - sz * 0.45, sz * 0.9, sz * 0.9, opts);
      break;
    case 'pentagon': {
      const pts = [];
      for (let i = 0; i < 5; i++) {
        const a = (i / 5) * Math.PI * 2 - Math.PI / 2;
        pts.push([mid + Math.cos(a) * sz * 0.48, mid + Math.sin(a) * sz * 0.48]);
      }
      crc.polygon(pts, opts);
      break;
    }
    case 'hexagon': {
      const pts = [];
      for (let i = 0; i < 6; i++) {
        const a = (i / 6) * Math.PI * 2;
        pts.push([mid + Math.cos(a) * sz * 0.48, mid + Math.sin(a) * sz * 0.48]);
      }
      crc.polygon(pts, opts);
      break;
    }
  }

  // Construction mark: center dot
  const cc = c.getContext('2d');
  cc.fillStyle = `rgba(${r},${g},${b},${shape.isPalette ? 0.08 : 0.18})`;
  cc.beginPath();
  cc.arc(mid, mid, Math.max(1.5, unit * 0.003), 0, Math.PI * 2);
  cc.fill();

  shape._cache = c;
  shape._dirty = false;
}

function drawShape(shape, time) {
  if (shape._dirty || !shape._cache) cacheShape(shape);
  if (!shape._cache) return;

  const def = SHAPE_DEFS[shape.type];
  const t = time * 0.001;
  const bp = t * def.bRate * Math.PI * 2 + shape.phase;
  let sc = 1, rot = 0, extraAlpha = 0;

  switch (def.breath) {
    case 'pulse':
      // Warm breathing — smooth sine pulse
      sc = 1 + Math.sin(bp) * def.bAmt;
      break;
    case 'flicker':
      // Shimmering — rapid small jitters + slow sway
      sc = 1 + Math.sin(bp) * def.bAmt * 0.5;
      rot = Math.sin(bp * 0.14) * 0.03 + Math.sin(bp * 3.7) * 0.008;
      extraAlpha = Math.sin(bp * 2.3) * 0.08;
      break;
    case 'tick':
      // Sharp metronomic snap — eased square-ish wave
      { const raw = Math.sin(bp);
        sc = 1 + Math.sign(raw) * Math.pow(Math.abs(raw), 0.3) * def.bAmt; }
      break;
    case 'drift':
      // Ethereal slow rotation
      rot = bp * def.bAmt;
      sc = 1 + Math.sin(bp * 0.6) * 0.015;
      break;
    case 'kick':
      // Punchy expand then relax
      { const phase = ((bp % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
        const hit = Math.max(0, 1 - phase / 1.2);
        sc = 1 + hit * hit * def.bAmt * 3; }
      break;
  }

  // Lift when dragging
  if (drag && drag.shape === shape) sc *= 1.1;

  // Glow when proximate
  const glow = Math.min((shape.proxBoost || 0) / 4, 0.5);

  ctx.save();
  ctx.globalAlpha = clamp(shape.opacity + extraAlpha, 0, 1);
  ctx.translate(shape.x * W, shape.y * H);
  ctx.rotate(rot + (shape.volAngle || 0));
  ctx.scale(sc, sc);

  // Subtle proximity glow halo
  if (glow > 0.02 && !shape.isPalette) {
    const [r, g, b] = shape.rgb;
    const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, shape._cache.width * 0.6);
    grad.addColorStop(0, `rgba(${r},${g},${b},${glow * 0.15})`);
    grad.addColorStop(1, `rgba(${r},${g},${b},0)`);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(0, 0, shape._cache.width * 0.6, 0, Math.PI * 2);
    ctx.fill();
  }

  // Stroke luminosity — blurred glow underneath the sharp shape,
  // like chalk catching lamplight from within.
  if (!shape.isPalette) {
    const breathGlow = 0.5 + Math.sin(bp) * 0.2;  // pulse with breath
    const proxGlow = Math.min(glow * 0.5, 0.2);
    const glowAlpha = (0.25 + proxGlow) * breathGlow;
    const blurPx = Math.max(6, shape._cache.width * 0.12);
    ctx.save();
    ctx.globalAlpha *= glowAlpha;
    ctx.filter = `blur(${blurPx}px)`;
    ctx.drawImage(shape._cache, -shape._cache.width / 2, -shape._cache.height / 2);
    ctx.restore();
  }

  ctx.drawImage(shape._cache, -shape._cache.width / 2, -shape._cache.height / 2);
  ctx.restore();
}

function removeShape(shape) {
  if (shape.dying) return;
  shape.dying = true;
  // Fade audio out in parallel
  detachSynth(shape);
  recomputeProximity();
}

/* =============================================================
   DRAFTING TABLE
   ============================================================= */

function buildGrain() {
  grainCvs = document.createElement('canvas');
  grainCvs.width = W; grainCvs.height = H;
  const gc = grainCvs.getContext('2d');
  const img = gc.createImageData(W, H);
  const d = img.data;
  for (let i = 0; i < d.length; i += 4) {
    const v = Math.random() * 255;
    d[i] = d[i+1] = d[i+2] = v;
    d[i+3] = Math.random() * 14;
  }
  gc.putImageData(img, 0, 0);
}

function buildTable() {
  tableCvs = document.createElement('canvas');
  tableCvs.width = W; tableCvs.height = H;
  const tc = tableCvs.getContext('2d');
  const trc = rough.canvas(tableCvs);

  // Dot grid
  const sp = DOT_SP * unit;
  const dr = Math.max(0.8, unit * 0.0018);
  tc.fillStyle = `rgba(180,170,155,${DOT_ALPHA})`;
  for (let x = sp; x < W; x += sp)
    for (let y = sp; y < H * PAL_ZONE; y += sp) {
      tc.beginPath(); tc.arc(x, y, dr, 0, Math.PI * 2); tc.fill();
    }

  // Palette shelf
  const g = tc.createLinearGradient(0, H * 0.84, 0, H);
  g.addColorStop(0, 'rgba(180,170,155,0)');
  g.addColorStop(0.3, 'rgba(180,170,155,0.035)');
  g.addColorStop(1, 'rgba(180,170,155,0.055)');
  tc.fillStyle = g;
  tc.fillRect(0, H * 0.84, W, H * 0.16);

  // Shelf divider line
  trc.line(W * 0.06, H * PAL_ZONE + H * 0.003, W * 0.94, H * PAL_ZONE + H * 0.003, {
    stroke: 'rgba(180,170,155,0.14)', strokeWidth: 0.8, roughness: 2, seed: 9999
  });

  // Compass rose — upper-left
  const cx = unit * 0.06, cy = unit * 0.06, sz = unit * 0.032;
  const cc = 'rgba(180,170,155,0.07)';
  const lo = { stroke: cc, strokeWidth: 0.6, roughness: 1.5, seed: 7777 };
  trc.line(cx, cy - sz, cx, cy + sz, lo);
  trc.line(cx - sz, cy, cx + sz, cy, lo);
  const d2 = sz * 0.55;
  trc.line(cx - d2, cy - d2, cx + d2, cy + d2, lo);
  trc.line(cx + d2, cy - d2, cx - d2, cy + d2, lo);
  trc.circle(cx, cy, sz * 0.2, { ...lo, fill: cc, fillStyle: 'solid' });
  tc.font = `${Math.max(8, sz * 0.35)}px Georgia`;
  tc.fillStyle = cc; tc.textAlign = 'center';
  tc.fillText('N', cx, cy - sz - 3);

  // Smudge marks
  [[0.72, 0.30, 0.07], [0.18, 0.58, 0.045], [0.85, 0.70, 0.035]].forEach(([sx, sy, sr]) => {
    const gr = tc.createRadialGradient(sx * W, sy * H, 0, sx * W, sy * H, sr * unit);
    gr.addColorStop(0, 'rgba(45,38,32,0.05)');
    gr.addColorStop(1, 'rgba(45,38,32,0)');
    tc.fillStyle = gr;
    tc.beginPath();
    tc.ellipse(sx * W, sy * H, sr * unit, sr * unit * 0.6, sx * 3, 0, Math.PI * 2);
    tc.fill();
  });
}

/* =============================================================
   VOLUME SLIDER
   ============================================================= */

const VOL_X = 0.06;

function volSliderGeom() {
  const x = VOL_X * W;
  const y0 = H * (PAL_ZONE + 0.025);
  const y1 = H * 0.975;
  const knobY = y0 + (1 - volumeVal) * (y1 - y0);
  const knobR = Math.max(10, unit * 0.012);
  return { x, y0, y1, knobY, knobR };
}

function drawVolumeSlider() {
  const { x, y0, y1, knobY, knobR } = volSliderGeom();
  // Track line
  rc.line(x, y0, x, y1, {
    stroke: 'rgba(180,170,155,0.18)', strokeWidth: 1, roughness: 1.5, seed: 5555
  });
  // Knob
  rc.circle(x, knobY, knobR * 2, {
    stroke: 'rgba(200,190,170,0.5)', strokeWidth: 1.2, roughness: 1.2,
    fill: 'rgba(200,190,170,0.08)', fillStyle: 'solid', seed: 5556
  });
  // Tiny speaker icon above
  ctx.save();
  ctx.font = `${Math.max(9, unit * 0.014)}px Georgia`;
  ctx.fillStyle = 'rgba(180,170,155,0.18)';
  ctx.textAlign = 'center';
  ctx.fillText('♪', x, y0 - 6);
  ctx.restore();
}

function hitVolSlider(px, py) {
  const { x, y0, y1, knobY, knobR } = volSliderGeom();
  const dx = px - x, dy = py - knobY;
  return (dx * dx + dy * dy) < (knobR + 12) * (knobR + 12);
}

function updateVolFromY(py) {
  const { y0, y1 } = volSliderGeom();
  volumeVal = clamp(1 - (py - y0) / (y1 - y0), 0, 1);
  if (masterGain && actx) masterGain.gain.linearRampToValueAtTime(volumeVal, actx.currentTime + 0.08);
}

/* =============================================================
   INTERACTION
   ============================================================= */

function hitTest(px, py) {
  const EDGE_INNER = 0.55;  // fraction of hit radius — inside this is 'center'
  for (let i = shapes.length - 1; i >= 0; i--) {
    const s = shapes[i];
    if (s.dying) continue;
    const dx = px - s.x * W, dy = py - s.y * H;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const hr = Math.max(s.size * unit * 0.55, MIN_HIT);
    if (dist < hr) {
      const zone = dist > hr * EDGE_INNER ? 'edge' : 'center';
      return { shape: s, from: 'shape', zone };
    }
  }
  for (let i = palette.length - 1; i >= 0; i--) {
    const s = palette[i];
    const dx = px - s.x * W, dy = py - s.y * H;
    const hr = Math.max(s.size * unit * 0.55, MIN_HIT);
    if (dx * dx + dy * dy < hr * hr) return { shape: s, from: 'palette', zone: 'center' };
  }
  return null;
}

function onDown(e) {
  // Audio init BEFORE preventDefault — some browsers consider
  // preventDefault as breaking the gesture chain for audio unlock.
  if (!audioOK) initAudio();

  e.preventDefault();
  if (e.pointerId != null) cvs.setPointerCapture(e.pointerId);

  const px = e.clientX ?? e.touches?.[0]?.clientX ?? 0;
  const py = e.clientY ?? e.touches?.[0]?.clientY ?? 0;

  // Volume slider
  if (hitVolSlider(px, py)) {
    volDrag = true;
    updateVolFromY(py);
    return;
  }

  const hit = hitTest(px, py);

  // Double-tap center → remove (edge taps don't count — those are volume knob)
  if (hit && hit.from === 'shape' && hit.zone === 'center') {
    const now = performance.now();
    if (tapId === hit.shape.id && now - tapTime < DBL_TAP_MS) {
      removeShape(hit.shape);
      tapId = -1;
      return;
    }
    tapTime = now;
    tapId = hit.shape.id;
  }

  if (!hit) return;

  if (hit.from === 'palette') {
    const tmpl = hit.shape;
    const ns = makeShape(tmpl.type, tmpl.x, tmpl.y, false);
    shapes.push(ns);
    if (masterGain) attachSynth(ns);
    drag = { shape: ns, ox: 0, oy: 0, fromPal: true };
  } else if (hit.zone === 'edge') {
    // Edge drag → rotate = volume knob (incremental accumulation for multi-turn)
    const angle = Math.atan2(py - hit.shape.y * H, px - hit.shape.x * W);
    drag = { shape: hit.shape, mode: 'rotate', prevAngle: angle };
    // Raise to top
    const idx = shapes.indexOf(hit.shape);
    if (idx >= 0) { shapes.splice(idx, 1); shapes.push(hit.shape); }
  } else {
    drag = {
      shape: hit.shape,
      ox: hit.shape.x - px / W,
      oy: hit.shape.y - py / H,
      fromPal: false
    };
    // Raise to top
    const idx = shapes.indexOf(hit.shape);
    if (idx >= 0) { shapes.splice(idx, 1); shapes.push(hit.shape); }
  }
}

function onMove(e) {
  if (volDrag) {
    e.preventDefault();
    const my = e.clientY ?? e.touches?.[0]?.clientY ?? 0;
    updateVolFromY(my);
    return;
  }
  if (!drag) return;
  e.preventDefault();
  const s = drag.shape;
  const mx = e.clientX ?? e.touches?.[0]?.clientX ?? 0;
  const my = e.clientY ?? e.touches?.[0]?.clientY ?? 0;

  if (drag.mode === 'rotate') {
    const VOL_MAX = 3 * Math.PI;
    const angle = Math.atan2(my - s.y * H, mx - s.x * W);
    let delta = angle - drag.prevAngle;
    while (delta > Math.PI) delta -= Math.PI * 2;
    while (delta < -Math.PI) delta += Math.PI * 2;
    s.volAngle = clamp(s.volAngle + delta, -VOL_MAX, VOL_MAX);
    drag.prevAngle = angle;
    if (s.synth) s.synth.setVol(shapeVolume(s));
  } else {
    s.x = clamp(mx / W + drag.ox, 0.03, 0.97);
    s.y = clamp(my / H + drag.oy, 0.03, 0.97);
    updateShapeAudio(s);
    recomputeProximity();
  }
}

function onUp(e) {
  volDrag = false;
  if (!drag) return;
  const s = drag.shape;

  // Remove if dropped into palette zone (unless freshly created from palette and not moved up)
  if (drag.fromPal && s.y > PAL_ZONE - 0.03) {
    removeShape(s);
  } else if (!drag.fromPal && s.y > PAL_ZONE + 0.02) {
    removeShape(s);
  }

  drag = null;
}

cvs.addEventListener('pointerdown', onDown, { passive: false });
cvs.addEventListener('pointermove', onMove, { passive: false });
cvs.addEventListener('pointerup', onUp);
cvs.addEventListener('pointercancel', () => { drag = null; });

// touchstart is a valid user activation for AudioContext (pointerdown is NOT on touch).
// pointerdown fires first and creates the context, but it stays suspended.
// This handler resumes it from a real touch gesture.
cvs.addEventListener('touchstart', (e) => {
  if (!audioOK) { initAudio(); e.preventDefault(); }
  if (actx && actx.state !== 'running') actx.resume();
}, { passive: false });

// Mouse wheel → per-shape volume knob (hover over shape and scroll)
cvs.addEventListener('wheel', (e) => {
  const hit = hitTest(e.clientX, e.clientY);
  if (hit && hit.from === 'shape') {
    e.preventDefault();
    const s = hit.shape;
    // deltaY > 0 = scroll down = quieter (counterclockwise)
    s.volAngle = clamp(s.volAngle - e.deltaY * 0.009, -3 * Math.PI, 3 * Math.PI);
    if (s.synth) s.synth.setVol(shapeVolume(s));
  }
}, { passive: false });

// Document-level fallback unlock — catches taps outside the canvas
document.addEventListener('click', () => {
  if (!audioOK) initAudio();
  if (actx && actx.state !== 'running') actx.resume();
}, { once: true });
document.addEventListener('touchstart', () => {
  if (!audioOK) initAudio();
  if (actx && actx.state !== 'running') actx.resume();
}, { once: true });

/* =============================================================
   SCENE DRAWING
   ============================================================= */

function draw(time) {
  requestAnimationFrame(draw);

  // Late-attach synths — only when context is running
  if (masterGain && actx && actx.state === 'running') {
    shapes.forEach(s => { if (!s.synth && !s.isPalette && !s.dying) attachSynth(s); });
  }

  // Fade transitions
  shapes.forEach(s => {
    if (s.dying) {
      s.opacity = Math.max(0, s.opacity - 0.025);
    } else if (s.opacity < s.fadeTarget) {
      s.opacity = Math.min(s.fadeTarget, s.opacity + 0.02);
    }
  });
  // Remove fully faded shapes
  for (let i = shapes.length - 1; i >= 0; i--) {
    if (shapes[i].dying && shapes[i].opacity <= 0) {
      shapes.splice(i, 1);
    }
  }

  // Background
  ctx.fillStyle = BG;
  ctx.fillRect(0, 0, W, H);

  // Static table surface
  if (tableCvs) ctx.drawImage(tableCvs, 0, 0);

  // Dust motes (behind shapes)
  updateAndDrawMotes(time);

  // Proximity lines
  drawProximityLines();

  // Shapes — z-sort by y (lower y = further back = drawn first)
  const sorted = [...shapes].sort((a, b) => a.y - b.y);
  sorted.forEach(s => drawShape(s, time));

  // Palette shapes
  palette.forEach(s => drawShape(s, time));

  // Volume slider
  drawVolumeSlider();

  // Grain overlay
  if (grainCvs) {
    ctx.globalAlpha = 0.055;
    ctx.drawImage(grainCvs, 0, 0);
    ctx.globalAlpha = 1;
  }
}

/* =============================================================
   INIT
   ============================================================= */

function initPalette() {
  palette = [];
  const count = TYPES.length;
  const spacing = Math.min(0.15, 0.65 / count);
  const startX = 0.52 - (count - 1) * spacing / 2;
  TYPES.forEach((t, i) => {
    palette.push(makeShape(t, startX + i * spacing, PAL_Y, true));
  });
}

function initScene() {
  shapes = [];
  // 3 random shapes at random positions each load
  const pool = TYPES.slice();
  for (let i = 0; i < 3; i++) {
    const idx = Math.floor(Math.random() * pool.length);
    const type = pool.splice(idx, 1)[0];
    const x = 0.15 + Math.random() * 0.70;
    const y = 0.15 + Math.random() * 0.55;
    shapes.push(makeShape(type, x, y, false));
  }
  recomputeProximity();
}

function resize() {
  W = cvs.width  = window.innerWidth;
  H = cvs.height = window.innerHeight;
  unit = Math.min(W, H);
  rc = rough.canvas(cvs);

  buildGrain();
  buildTable();
  [...shapes, ...palette].forEach(s => { s._dirty = true; });
}

window.addEventListener('resize', resize);
resize();
initPalette();
initScene();
initMotes();
requestAnimationFrame(draw);
</script>
</body>
</html>
