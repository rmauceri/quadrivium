<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Quadrivium</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; overscroll-behavior: none; background: #2c2520; }
canvas { display: block; touch-action: none; }
#overlay {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none;
  opacity: 1; transition: opacity 1.8s ease-out;
}
#overlay.hidden { opacity: 0; }
#overlay span {
  font-family: Georgia, 'Times New Roman', serif;
  font-size: clamp(0.9rem, 2.5vw, 1.3rem);
  color: rgba(200, 190, 170, 0.35);
  letter-spacing: 0.25em;
  text-transform: lowercase;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="overlay"><span>touch to begin</span></div>

<script src="https://cdn.jsdelivr.net/npm/roughjs@4.6.6/bundled/rough.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tone@14.7.77/build/Tone.js"></script>
<script>
'use strict';

/* =============================================================
   CONSTANTS & CONFIG
   ============================================================= */

const BG = '#2c2520';

// A minor pentatonic — 3 octaves
const SCALE = [
  110.00, 130.81, 146.83, 164.81, 196.00,
  220.00, 261.63, 293.66, 329.63, 392.00,
  440.00, 523.25, 587.33, 659.26, 783.99,
  880.00
];

const SHAPE_DEFS = {
  circle:   { color: [230,175,50],  breath: 'pulse',  bRate: 0.30, bAmt: 0.055, rough: 1.5, fill: 'hachure',     hAng: -41, hGap: 5 },
  triangle: { color: [230,90,100],  breath: 'flicker',bRate: 1.80, bAmt: 0.025, rough: 1.8, fill: 'cross-hatch', hAng:  60, hGap: 6 },
  square:   { color: [80,150,200],  breath: 'tick',   bRate: 0.60, bAmt: 0.045, rough: 1.0, fill: 'hachure',     hAng:   0, hGap: 5 },
  pentagon: { color: [170,110,210], breath: 'drift',  bRate: 0.05, bAmt: 0.10,  rough: 1.6, fill: 'hachure',     hAng:  30, hGap: 5 },
  hexagon:  { color: [100,190,130], breath: 'kick',   bRate: 0.30, bAmt: 0.06,  rough: 1.3, fill: 'hachure',     hAng: -60, hGap: 5 },
};

const TYPES       = Object.keys(SHAPE_DEFS);
const BASE_SIZE   = 0.065;
const SIZE_VARY   = 0.012;
const PAL_SCALE   = 0.55;
const PAL_Y       = 0.93;
const PAL_ZONE    = 0.87;
const PROX_FRAC   = 0.28;
const MIN_HIT     = 44;
const DBL_TAP_MS  = 350;
const DOT_SP      = 0.03;
const DOT_ALPHA   = 0.10;

/* =============================================================
   STATE
   ============================================================= */

const cvs = document.getElementById('c');
const ctx = cvs.getContext('2d');
let rc;
let W, H, unit;

let shapes   = [];
let palette  = [];
let drag     = null;
let audioOK  = false;
let tapTime  = 0, tapId = -1;
let proxPairs = [];
let nextId   = 1;
let volumeVal = 0.7;
let volDrag   = false;

let grainCvs, tableCvs;
let masterGain;

/* =============================================================
   UTILITY
   ============================================================= */

const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

function pitchFromY(y) {
  const t = 1 - clamp(y, 0, 1);
  return SCALE[Math.round(t * (SCALE.length - 1))];
}

function volFromSize(sz) {
  const t = clamp((sz - 0.04) / 0.04, 0, 1);
  return -26 + t * 8;
}

function pxDist(a, b) {
  const dx = (a.x - b.x) * W, dy = (a.y - b.y) * H;
  return Math.sqrt(dx * dx + dy * dy);
}

/* =============================================================
   AUDIO ENGINE
   ============================================================= */

function initAudio() {
  if (audioOK) return;
  audioOK = true;
  document.getElementById('overlay').classList.add('hidden');

  // iOS-safe: create a raw AudioContext synchronously in the gesture
  // handler, then hand it to Tone.js.  This is the proven wunderkammer
  // pattern — the context is "gesture-blessed" because it was born here.
  const rawCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (rawCtx.state === 'suspended') rawCtx.resume();
  Tone.setContext(rawCtx);

  // Fire-and-forget — context is already running, no need to await
  Tone.start();

  // Build entire audio graph synchronously
  Tone.Transport.bpm.value = 120;
  Tone.Transport.start();
  masterGain = new Tone.Gain(volumeVal).toDestination();

  shapes.forEach(s => attachSynth(s));
  recomputeProximity();

  // iOS 17.5+ visibility bug — context gets interrupted on tab switch
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') {
      if (rawCtx.state !== 'running') rawCtx.resume();
    }
  });
}

function attachSynth(shape) {
  if (shape.synth || shape.isPalette || !masterGain) return;
  let synth, extras = [];

  switch (shape.type) {
    case 'circle': {
      synth = new Tone.Synth({
        oscillator: { type: 'sine' },
        envelope: { attack: 2, decay: 0, sustain: 1, release: 2 }
      });
      const tr = new Tone.Tremolo({ frequency: 0.15, depth: 0.18 }).start();
      extras.push(tr);
      synth.chain(tr, masterGain);
      break;
    }
    case 'triangle': {
      synth = new Tone.FMSynth({
        harmonicity: 3, modulationIndex: 1.4,
        oscillator: { type: 'sine' }, modulation: { type: 'sine' },
        envelope: { attack: 1.5, decay: 0, sustain: 1, release: 2 },
        modulationEnvelope: { attack: 1.5, decay: 0, sustain: 1, release: 2 }
      });
      const ch = new Tone.Chorus({ frequency: 0.8, depth: 0.4, wet: 0.3 }).start();
      extras.push(ch);
      synth.chain(ch, masterGain);
      break;
    }
    case 'square': {
      const tick = new Tone.NoiseSynth({
        noise: { type: 'white' },
        envelope: { attack: 0.001, decay: 0.08, sustain: 0, release: 0.03 },
        volume: 0
      });
      tick.connect(masterGain);
      const rate = 0.15 + shape.x * 0.6;
      const loop = new Tone.Loop((time) => {
        tick.triggerAttackRelease('16n', time);
      }, rate);
      loop.start(0);
      extras.push(loop);
      if (Tone.Transport.state !== 'started') Tone.Transport.start();
      synth = { _isRhythm: true, _src: tick, _loop: loop, volume: tick.volume };
      shape.synth = synth;
      shape.extras = extras;
      return;
    }
    case 'pentagon': {
      synth = new Tone.Synth({
        oscillator: { type: 'fatsine', count: 3, spread: 35 },
        envelope: { attack: 3, decay: 0, sustain: 1, release: 3 }
      });
      const ph = new Tone.Phaser({ frequency: 0.15, octaves: 2, wet: 0.25 });
      extras.push(ph);
      synth.chain(ph, masterGain);
      break;
    }
    case 'hexagon': {
      const kick = new Tone.MembraneSynth({
        pitchDecay: 0.05, octaves: 8,
        envelope: { attack: 0.001, decay: 0.4, sustain: 0, release: 0.5 },
        volume: 6
      });
      kick.connect(masterGain);
      extras = [];
      const rate = 0.3 + shape.x * 1.2;
      const loop = new Tone.Loop((time) => {
        kick.triggerAttackRelease(pitchFromY(shape.y) * 0.5, '8n', time);
      }, rate);
      loop.start(0);
      extras.push(loop);
      if (Tone.Transport.state !== 'started') Tone.Transport.start();
      synth = { _isRhythm: true, _src: kick, _loop: loop, volume: kick.volume };
      shape.synth = synth;
      shape.extras = extras;
      return;
    }
  }

  shape.synth  = synth;
  shape.extras = extras;
  synth.volume.value = volFromSize(shape.size);
  synth.triggerAttack(pitchFromY(shape.y));
}

function detachSynth(shape) {
  if (!shape.synth) return;
  const s = shape.synth, ex = shape.extras || [];
  shape.synth = null; shape.extras = [];

  if (s._isRhythm) {
    if (s._loop) try { s._loop.stop(); s._loop.dispose(); } catch(_){}
    s.volume.rampTo(-60, 0.5);
    setTimeout(() => {
      try { if (s._src) s._src.dispose(); } catch(_){}
      ex.forEach(e => { try { e.dispose(); } catch(_){} });
    }, 600);
  } else {
    s.volume.rampTo(-60, 0.6);
    setTimeout(() => {
      try { s.triggerRelease(); } catch(_){}
      setTimeout(() => {
        try { s.dispose(); } catch(_){}
        ex.forEach(e => { try { e.dispose(); } catch(_){} });
      }, 3500);
    }, 650);
  }
}

function updateShapeAudio(shape) {
  if (!shape.synth) return;
  if (shape.synth._isRhythm) {
    if (shape.synth._loop) {
      const rate = shape.type === 'square'
        ? (0.2 + shape.x * 0.8)
        : (0.4 + shape.x * 1.6);
      shape.synth._loop.interval = rate;
    }
    if (shape.synth._src && shape.synth._src.frequency) {
      shape.synth._src.frequency.value = pitchFromY(shape.y) * 0.5;
    }
  } else {
    shape.synth.frequency.rampTo(pitchFromY(shape.y), 0.12);
  }
}

function applyProximityAudio() {
  shapes.forEach(s => {
    if (!s.synth) return;
    const base  = volFromSize(s.size);
    const boost = Math.min(s.proxBoost || 0, 6);
    s.synth.volume.rampTo(base + boost, 0.25);
  });
}

/* =============================================================
   PROXIMITY
   ============================================================= */

function recomputeProximity() {
  const diag = Math.sqrt(W * W + H * H);
  const thresh = PROX_FRAC * diag;
  proxPairs = [];
  shapes.forEach(s => s.proxBoost = 0);

  for (let i = 0; i < shapes.length; i++) {
    for (let j = i + 1; j < shapes.length; j++) {
      const d = pxDist(shapes[i], shapes[j]);
      if (d < thresh) {
        const str = 1 - d / thresh;
        proxPairs.push({ a: shapes[i], b: shapes[j], strength: str });
        shapes[i].proxBoost += str * 3.5;
        shapes[j].proxBoost += str * 3.5;
      }
    }
  }

  if (audioOK) applyProximityAudio();
}

function drawProximityLines() {
  proxPairs.forEach(({ a, b, strength }) => {
    const alpha = strength * 0.22;
    if (alpha < 0.01) return;
    rc.line(a.x * W, a.y * H, b.x * W, b.y * H, {
      stroke: `rgba(200,190,170,${alpha})`,
      strokeWidth: 0.4 + strength * 1.2,
      roughness: 2.5,
      seed: a.seed ^ b.seed,
    });
  });
}

/* =============================================================
   SHAPE SYSTEM
   ============================================================= */

function makeShape(type, x, y, asPalette) {
  const def = SHAPE_DEFS[type];
  const [cr, cg, cb] = def.color;
  const v = asPalette ? 0 : 18;
  return {
    id: nextId++, type, x, y,
    size: asPalette ? BASE_SIZE * PAL_SCALE : BASE_SIZE + (Math.random() - 0.5) * SIZE_VARY * 2,
    rgb: [
      clamp(Math.round(cr + (Math.random() - 0.5) * v), 0, 255),
      clamp(Math.round(cg + (Math.random() - 0.5) * v), 0, 255),
      clamp(Math.round(cb + (Math.random() - 0.5) * v), 0, 255),
    ],
    phase: Math.random() * Math.PI * 2,
    seed: Math.floor(Math.random() * 1e6),
    synth: null, extras: [],
    opacity: asPalette ? 0.55 : 1,
    isPalette: !!asPalette,
    proxBoost: 0,
    _cache: null, _dirty: true,
  };
}

function cacheShape(shape) {
  const px = Math.ceil(shape.size * unit * 1.8);
  if (px < 4) return;

  const c = document.createElement('canvas');
  c.width = c.height = px;
  const crc = rough.canvas(c);
  const mid = px / 2, sz = shape.size * unit;
  const [r, g, b] = shape.rgb;
  const sa = shape.isPalette ? 0.65 : 0.85;
  const fa = shape.isPalette ? 0.12 : 0.20;

  const opts = {
    stroke: `rgba(${r},${g},${b},${sa})`,
    strokeWidth: shape.isPalette ? 1 : 1.5,
    roughness: SHAPE_DEFS[shape.type].rough,
    fill: `rgba(${r},${g},${b},${fa})`,
    fillStyle: SHAPE_DEFS[shape.type].fill,
    fillWeight: 0.5,
    hachureAngle: SHAPE_DEFS[shape.type].hAng,
    hachureGap: Math.max(3, SHAPE_DEFS[shape.type].hGap * (unit / 700)),
    seed: shape.seed,
  };

  switch (shape.type) {
    case 'circle':
      crc.circle(mid, mid, sz, opts);
      break;
    case 'triangle': {
      const h = sz * 0.866;
      crc.polygon([
        [mid, mid - h * 0.55],
        [mid - sz * 0.5, mid + h * 0.45],
        [mid + sz * 0.5, mid + h * 0.45],
      ], opts);
      break;
    }
    case 'square':
      crc.rectangle(mid - sz * 0.45, mid - sz * 0.45, sz * 0.9, sz * 0.9, opts);
      break;
    case 'pentagon': {
      const pts = [];
      for (let i = 0; i < 5; i++) {
        const a = (i / 5) * Math.PI * 2 - Math.PI / 2;
        pts.push([mid + Math.cos(a) * sz * 0.48, mid + Math.sin(a) * sz * 0.48]);
      }
      crc.polygon(pts, opts);
      break;
    }
    case 'hexagon': {
      const pts = [];
      for (let i = 0; i < 6; i++) {
        const a = (i / 6) * Math.PI * 2;
        pts.push([mid + Math.cos(a) * sz * 0.48, mid + Math.sin(a) * sz * 0.48]);
      }
      crc.polygon(pts, opts);
      break;
    }
  }

  // Construction mark: center dot
  const cc = c.getContext('2d');
  cc.fillStyle = `rgba(${r},${g},${b},${shape.isPalette ? 0.08 : 0.18})`;
  cc.beginPath();
  cc.arc(mid, mid, Math.max(1.5, unit * 0.003), 0, Math.PI * 2);
  cc.fill();

  shape._cache = c;
  shape._dirty = false;
}

function drawShape(shape, time) {
  if (shape._dirty || !shape._cache) cacheShape(shape);
  if (!shape._cache) return;

  const def = SHAPE_DEFS[shape.type];
  const t = time * 0.001;
  const bp = t * def.bRate * Math.PI * 2 + shape.phase;
  let sc = 1, rot = 0, extraAlpha = 0;

  switch (def.breath) {
    case 'pulse':
      // Warm breathing — smooth sine pulse
      sc = 1 + Math.sin(bp) * def.bAmt;
      break;
    case 'flicker':
      // Shimmering — rapid small jitters + slow sway
      sc = 1 + Math.sin(bp) * def.bAmt * 0.5;
      rot = Math.sin(bp * 0.14) * 0.03 + Math.sin(bp * 3.7) * 0.008;
      extraAlpha = Math.sin(bp * 2.3) * 0.08;
      break;
    case 'tick':
      // Sharp metronomic snap — eased square-ish wave
      { const raw = Math.sin(bp);
        sc = 1 + Math.sign(raw) * Math.pow(Math.abs(raw), 0.3) * def.bAmt; }
      break;
    case 'drift':
      // Ethereal slow rotation
      rot = bp * def.bAmt;
      sc = 1 + Math.sin(bp * 0.6) * 0.015;
      break;
    case 'kick':
      // Punchy expand then relax
      { const phase = ((bp % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
        const hit = Math.max(0, 1 - phase / 1.2);
        sc = 1 + hit * hit * def.bAmt * 3; }
      break;
  }

  // Lift when dragging
  if (drag && drag.shape === shape) sc *= 1.1;

  // Glow when proximate
  const glow = Math.min((shape.proxBoost || 0) / 4, 0.5);

  ctx.save();
  ctx.globalAlpha = clamp(shape.opacity + extraAlpha, 0, 1);
  ctx.translate(shape.x * W, shape.y * H);
  ctx.rotate(rot);
  ctx.scale(sc, sc);

  // Subtle proximity glow halo
  if (glow > 0.02 && !shape.isPalette) {
    const [r, g, b] = shape.rgb;
    const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, shape._cache.width * 0.6);
    grad.addColorStop(0, `rgba(${r},${g},${b},${glow * 0.15})`);
    grad.addColorStop(1, `rgba(${r},${g},${b},0)`);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(0, 0, shape._cache.width * 0.6, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.drawImage(shape._cache, -shape._cache.width / 2, -shape._cache.height / 2);
  ctx.restore();
}

function removeShape(shape) {
  const idx = shapes.indexOf(shape);
  if (idx >= 0) shapes.splice(idx, 1);
  detachSynth(shape);
  recomputeProximity();
}

/* =============================================================
   DRAFTING TABLE
   ============================================================= */

function buildGrain() {
  grainCvs = document.createElement('canvas');
  grainCvs.width = W; grainCvs.height = H;
  const gc = grainCvs.getContext('2d');
  const img = gc.createImageData(W, H);
  const d = img.data;
  for (let i = 0; i < d.length; i += 4) {
    const v = Math.random() * 255;
    d[i] = d[i+1] = d[i+2] = v;
    d[i+3] = Math.random() * 14;
  }
  gc.putImageData(img, 0, 0);
}

function buildTable() {
  tableCvs = document.createElement('canvas');
  tableCvs.width = W; tableCvs.height = H;
  const tc = tableCvs.getContext('2d');
  const trc = rough.canvas(tableCvs);

  // Dot grid
  const sp = DOT_SP * unit;
  const dr = Math.max(0.8, unit * 0.0018);
  tc.fillStyle = `rgba(180,170,155,${DOT_ALPHA})`;
  for (let x = sp; x < W; x += sp)
    for (let y = sp; y < H * PAL_ZONE; y += sp) {
      tc.beginPath(); tc.arc(x, y, dr, 0, Math.PI * 2); tc.fill();
    }

  // Palette shelf
  const g = tc.createLinearGradient(0, H * 0.84, 0, H);
  g.addColorStop(0, 'rgba(180,170,155,0)');
  g.addColorStop(0.3, 'rgba(180,170,155,0.035)');
  g.addColorStop(1, 'rgba(180,170,155,0.055)');
  tc.fillStyle = g;
  tc.fillRect(0, H * 0.84, W, H * 0.16);

  // Shelf divider line
  trc.line(W * 0.06, H * PAL_ZONE + H * 0.003, W * 0.94, H * PAL_ZONE + H * 0.003, {
    stroke: 'rgba(180,170,155,0.14)', strokeWidth: 0.8, roughness: 2, seed: 9999
  });

  // Compass rose — upper-left
  const cx = unit * 0.06, cy = unit * 0.06, sz = unit * 0.032;
  const cc = 'rgba(180,170,155,0.07)';
  const lo = { stroke: cc, strokeWidth: 0.6, roughness: 1.5, seed: 7777 };
  trc.line(cx, cy - sz, cx, cy + sz, lo);
  trc.line(cx - sz, cy, cx + sz, cy, lo);
  const d2 = sz * 0.55;
  trc.line(cx - d2, cy - d2, cx + d2, cy + d2, lo);
  trc.line(cx + d2, cy - d2, cx - d2, cy + d2, lo);
  trc.circle(cx, cy, sz * 0.2, { ...lo, fill: cc, fillStyle: 'solid' });
  tc.font = `${Math.max(8, sz * 0.35)}px Georgia`;
  tc.fillStyle = cc; tc.textAlign = 'center';
  tc.fillText('N', cx, cy - sz - 3);

  // Smudge marks
  [[0.72, 0.30, 0.07], [0.18, 0.58, 0.045], [0.85, 0.70, 0.035]].forEach(([sx, sy, sr]) => {
    const gr = tc.createRadialGradient(sx * W, sy * H, 0, sx * W, sy * H, sr * unit);
    gr.addColorStop(0, 'rgba(45,38,32,0.05)');
    gr.addColorStop(1, 'rgba(45,38,32,0)');
    tc.fillStyle = gr;
    tc.beginPath();
    tc.ellipse(sx * W, sy * H, sr * unit, sr * unit * 0.6, sx * 3, 0, Math.PI * 2);
    tc.fill();
  });
}

/* =============================================================
   VOLUME SLIDER
   ============================================================= */

const VOL_X = 0.06;

function volSliderGeom() {
  const x = VOL_X * W;
  const y0 = H * (PAL_ZONE + 0.025);
  const y1 = H * 0.975;
  const knobY = y0 + (1 - volumeVal) * (y1 - y0);
  const knobR = Math.max(10, unit * 0.012);
  return { x, y0, y1, knobY, knobR };
}

function drawVolumeSlider() {
  const { x, y0, y1, knobY, knobR } = volSliderGeom();
  // Track line
  rc.line(x, y0, x, y1, {
    stroke: 'rgba(180,170,155,0.18)', strokeWidth: 1, roughness: 1.5, seed: 5555
  });
  // Knob
  rc.circle(x, knobY, knobR * 2, {
    stroke: 'rgba(200,190,170,0.5)', strokeWidth: 1.2, roughness: 1.2,
    fill: 'rgba(200,190,170,0.08)', fillStyle: 'solid', seed: 5556
  });
  // Tiny speaker icon above
  ctx.save();
  ctx.font = `${Math.max(9, unit * 0.014)}px Georgia`;
  ctx.fillStyle = 'rgba(180,170,155,0.18)';
  ctx.textAlign = 'center';
  ctx.fillText('♪', x, y0 - 6);
  ctx.restore();
}

function hitVolSlider(px, py) {
  const { x, y0, y1, knobY, knobR } = volSliderGeom();
  const dx = px - x, dy = py - knobY;
  return (dx * dx + dy * dy) < (knobR + 12) * (knobR + 12);
}

function updateVolFromY(py) {
  const { y0, y1 } = volSliderGeom();
  volumeVal = clamp(1 - (py - y0) / (y1 - y0), 0, 1);
  if (masterGain) masterGain.gain.rampTo(volumeVal, 0.08);
}

/* =============================================================
   INTERACTION
   ============================================================= */

function hitTest(px, py) {
  for (let i = shapes.length - 1; i >= 0; i--) {
    const s = shapes[i];
    const dx = px - s.x * W, dy = py - s.y * H;
    const hr = Math.max(s.size * unit * 0.55, MIN_HIT);
    if (dx * dx + dy * dy < hr * hr) return { shape: s, from: 'shape' };
  }
  for (let i = palette.length - 1; i >= 0; i--) {
    const s = palette[i];
    const dx = px - s.x * W, dy = py - s.y * H;
    const hr = Math.max(s.size * unit * 0.55, MIN_HIT);
    if (dx * dx + dy * dy < hr * hr) return { shape: s, from: 'palette' };
  }
  return null;
}

function onDown(e) {
  // Audio init BEFORE preventDefault — some browsers consider
  // preventDefault as breaking the gesture chain for audio unlock.
  if (!audioOK) initAudio();

  e.preventDefault();
  if (e.pointerId != null) cvs.setPointerCapture(e.pointerId);

  const px = e.clientX ?? e.touches?.[0]?.clientX ?? 0;
  const py = e.clientY ?? e.touches?.[0]?.clientY ?? 0;

  // Volume slider
  if (hitVolSlider(px, py)) {
    volDrag = true;
    updateVolFromY(py);
    return;
  }

  const hit = hitTest(px, py);

  // Double-tap → remove
  if (hit && hit.from === 'shape') {
    const now = performance.now();
    if (tapId === hit.shape.id && now - tapTime < DBL_TAP_MS) {
      removeShape(hit.shape);
      tapId = -1;
      return;
    }
    tapTime = now;
    tapId = hit.shape.id;
  }

  if (!hit) return;

  if (hit.from === 'palette') {
    const tmpl = hit.shape;
    const ns = makeShape(tmpl.type, tmpl.x, tmpl.y, false);
    shapes.push(ns);
    if (masterGain) attachSynth(ns);
    drag = { shape: ns, ox: 0, oy: 0, fromPal: true };
  } else {
    drag = {
      shape: hit.shape,
      ox: hit.shape.x - px / W,
      oy: hit.shape.y - py / H,
      fromPal: false
    };
    // Raise to top
    const idx = shapes.indexOf(hit.shape);
    if (idx >= 0) { shapes.splice(idx, 1); shapes.push(hit.shape); }
  }
}

function onMove(e) {
  if (volDrag) {
    e.preventDefault();
    const my = e.clientY ?? e.touches?.[0]?.clientY ?? 0;
    updateVolFromY(my);
    return;
  }
  if (!drag) return;
  e.preventDefault();
  const s = drag.shape;
  const mx = e.clientX ?? e.touches?.[0]?.clientX ?? 0;
  const my = e.clientY ?? e.touches?.[0]?.clientY ?? 0;
  s.x = clamp(mx / W + drag.ox, 0.03, 0.97);
  s.y = clamp(my / H + drag.oy, 0.03, 0.97);

  updateShapeAudio(s);
  recomputeProximity();
}

function onUp(e) {
  volDrag = false;
  if (!drag) return;
  const s = drag.shape;

  // Remove if dropped into palette zone (unless freshly created from palette and not moved up)
  if (drag.fromPal && s.y > PAL_ZONE - 0.03) {
    removeShape(s);
  } else if (!drag.fromPal && s.y > PAL_ZONE + 0.02) {
    removeShape(s);
  }

  drag = null;
}

cvs.addEventListener('pointerdown', onDown, { passive: false });
cvs.addEventListener('pointermove', onMove, { passive: false });
cvs.addEventListener('pointerup', onUp);
cvs.addEventListener('pointercancel', () => { drag = null; });

// iOS Safari fallback — touchstart is more reliable for audio unlock
cvs.addEventListener('touchstart', (e) => {
  if (!audioOK) { initAudio(); e.preventDefault(); }
}, { passive: false });

// Document-level fallback unlock — catches taps outside the canvas
document.addEventListener('click', () => { if (!audioOK) initAudio(); }, { once: true });
document.addEventListener('touchstart', () => { if (!audioOK) initAudio(); }, { once: true });

/* =============================================================
   SCENE DRAWING
   ============================================================= */

function draw(time) {
  requestAnimationFrame(draw);

  // Late-attach synths for shapes created before audio was ready
  if (masterGain) {
    shapes.forEach(s => { if (!s.synth && !s.isPalette) attachSynth(s); });
  }

  // Background
  ctx.fillStyle = BG;
  ctx.fillRect(0, 0, W, H);

  // Static table surface
  if (tableCvs) ctx.drawImage(tableCvs, 0, 0);

  // Proximity lines
  drawProximityLines();

  // Shapes — z-sort by y (lower y = further back = drawn first)
  const sorted = [...shapes].sort((a, b) => a.y - b.y);
  sorted.forEach(s => drawShape(s, time));

  // Palette shapes
  palette.forEach(s => drawShape(s, time));

  // Volume slider
  drawVolumeSlider();

  // Grain overlay
  if (grainCvs) {
    ctx.globalAlpha = 0.055;
    ctx.drawImage(grainCvs, 0, 0);
    ctx.globalAlpha = 1;
  }
}

/* =============================================================
   INIT
   ============================================================= */

function initPalette() {
  palette = [];
  const count = TYPES.length;
  const spacing = Math.min(0.15, 0.65 / count);
  const startX = 0.52 - (count - 1) * spacing / 2;
  TYPES.forEach((t, i) => {
    palette.push(makeShape(t, startX + i * spacing, PAL_Y, true));
  });
}

function initScene() {
  shapes = [];
  // Three shapes: circle + triangle close together, pentagon alone
  shapes.push(makeShape('circle',   0.32 + Math.random() * 0.03, 0.38 + Math.random() * 0.03, false));
  shapes.push(makeShape('triangle', 0.52 + Math.random() * 0.03, 0.33 + Math.random() * 0.03, false));
  shapes.push(makeShape('pentagon', 0.70 + Math.random() * 0.03, 0.62 + Math.random() * 0.03, false));
  recomputeProximity();
}

function resize() {
  W = cvs.width  = window.innerWidth;
  H = cvs.height = window.innerHeight;
  unit = Math.min(W, H);
  rc = rough.canvas(cvs);

  buildGrain();
  buildTable();
  [...shapes, ...palette].forEach(s => { s._dirty = true; });
}

window.addEventListener('resize', resize);
resize();
initPalette();
initScene();
requestAnimationFrame(draw);
</script>
</body>
</html>
